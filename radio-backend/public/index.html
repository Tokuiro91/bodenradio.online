<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BØDEN — Scheduling Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;400;700&family=Tektur:wght@500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --surface: #0a0a0a;
            --border: #1a1a1a;
            --accent: #99CCCC;
            --text: #ffffff;
            --font-sans: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-display: 'Tektur', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font-sans);
            letter-spacing: -0.01em;
        }

        .font-display {
            font-family: var(--font-display);
        }

        .font-mono {
            font-family: var(--font-mono);
        }

        .glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
        }

        .btn {
            background: transparent;
            color: white;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            text-transform: uppercase;
            font-size: 10px;
            letter-spacing: 0.1em;
            font-family: var(--font-mono);
        }

        .btn:hover {
            border-color: var(--accent);
            color: var(--accent);
            box-shadow: 0 0 15px rgba(220, 38, 38, 0.2);
        }

        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
            font-weight: bold;
        }

        .btn-primary:hover {
            background: white;
            border-color: white;
            color: black;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
        }

        .input-dark {
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            padding: 0.6rem;
            border-radius: 0;
            width: 100%;
            outline: none;
            font-family: var(--font-mono);
            font-size: 11px;
            transition: border-color 0.3s;
        }

        .input-dark:focus {
            border-color: var(--accent);
        }

        h1,
        h2,
        h3 {
            font-family: var(--font-display);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* FullCalendar Customizations */
        .fc {
            font-family: var(--font-mono) !important;
            font-size: 11px !important;
        }

        .fc .fc-toolbar-title {
            font-family: var(--font-display) !important;
            font-size: 16px !important;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .fc-theme-standard td,
        .fc-theme-standard th,
        .fc-theme-standard .fc-scrollgrid {
            border-color: #1a1a1a !important;
        }

        .fc-event {
            background-color: var(--accent) !important;
            border: none !important;
            color: white !important;
            padding: 4px 6px;
            border-radius: 0px !important;
            box-shadow: 4px 0 0 0 var(--accent) inset;
        }

        .fc-button {
            background: transparent !important;
            border: 1px solid var(--border) !important;
            color: #737373 !important;
            text-transform: uppercase !important;
            font-size: 9px !important;
            letter-spacing: 0.05em;
            border-radius: 0 !important;
            transition: all 0.2s !important;
        }

        .fc-button:hover {
            border-color: var(--accent) !important;
            color: white !important;
        }

        .fc-button-active {
            background: var(--accent) !important;
            color: white !important;
            border-color: var(--accent) !important;
        }

        .fc-timegrid-slot-label,
        .fc-col-header-cell {
            color: #444 !important;
            text-transform: uppercase;
            font-weight: normal !important;
        }

        .fc-day-today {
            background: rgba(153, 204, 204, 0.02) !important;
        }

        .logout {
            position: absolute;
            top: 2rem;
            right: 2rem;
            cursor: pointer;
            color: #444;
            font-family: var(--font-mono);
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s;
        }

        .logout:hover {
            color: var(--accent);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: var(--bg);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: var(--border);
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background-color: var(--surface);
            margin: 5% auto;
            padding: 2rem;
            border: 1px solid var(--border);
            width: 90%;
            max-width: 500px;
            border-radius: 4px;
        }
    </style>
</head>

<body class="p-8">
    <div id="login-view" class="max-w-md mx-auto mt-20 glass p-8 rounded-xl hidden">
        <h1 class="text-2xl mb-6 text-center text-[#99CCCC]">BØDEN // ADMIN LOGIN</h1>
        <input type="text" id="username" placeholder="Username" class="input-dark mb-4">
        <input type="password" id="password" placeholder="Password" class="input-dark mb-6">
        <button onclick="login()" class="btn btn-primary w-full">LOGIN</button>
    </div>

    <div id="dashboard-view" class="hidden">
        <span onclick="logout()" class="logout text-[10px] hover:underline opacity-50">LOGOUT</span>
        <h1 class="text-xs mb-6 border-b border-[#1a1a1a] pb-4 font-bold tracking-widest text-white">РАДИО ЭФИР //
            СИСТЕМА УПРАВЛЕНИЯ</h1>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-12">
            <!-- Sidebar -->
            <div class="col-span-1 border-r border-[#1a1a1a] pr-12">
                <!-- Tracks -->
                <div class="mb-12">
                    <h2 class="text-[10px] mb-6 font-bold text-[#737373] border-l-2 border-[#99CCCC] pl-2">БИБЛИОТЕКА
                    </h2>
                    <input type="file" id="file-upload" multiple class="hidden" onchange="uploadTracks()">
                    <button onclick="document.getElementById('file-upload').click()" id="upload-btn"
                        class="btn btn-primary w-full mb-6">ЗАГРУЗИТЬ MP3</button>
                    <div id="track-list"
                        class="space-y-1 h-64 overflow-y-auto pr-2 custom-scrollbar text-[10px] font-mono"></div>
                </div>

                <!-- Playlists -->
                <div class="mb-12">
                    <h2 class="text-[10px] mb-6 font-bold text-[#737373] border-l-2 border-[#99CCCC] pl-2">ПЛЕЙЛИСТЫ
                    </h2>
                    <div class="flex gap-2 mb-6">
                        <input type="text" id="new-playlist-name" placeholder="НАЗВАНИЕ" class="input-dark">
                        <button onclick="createPlaylist()" class="btn">+</button>
                    </div>
                    <div id="playlist-list"
                        class="space-y-1 h-64 overflow-y-auto pr-2 custom-scrollbar text-[10px] font-mono"></div>
                </div>

                <!-- Preview Player -->
                <div id="preview-container" class="glass p-4 hidden">
                    <h2 class="text-[8px] mb-2 font-bold text-[#737373] uppercase tracking-widest">ПРЕДПРОСЛУШИВАНИЕ
                    </h2>
                    <div id="preview-title" class="text-[9px] mb-2 truncate font-mono text-[#99CCCC]">...</div>
                    <audio id="audio-preview" controls class="w-full h-8 brightness-75 invert hue-rotate-180"></audio>
                </div>
            </div>

            <!-- Tab Area -->
            <div class="col-span-1 lg:col-span-3">
                <div class="flex gap-6 mb-8 border-b border-[#1a1a1a]">
                    <button onclick="switchMode('calendar')" id="tab-calendar"
                        class="text-[10px] font-bold text-[#99CCCC] border-b-2 border-[#99CCCC] pb-3 uppercase tracking-[0.2em]">Календарь</button>
                    <button onclick="switchMode('list')" id="tab-list"
                        class="text-[10px] font-bold text-[#444] hover:text-[#99CCCC] pb-3 uppercase tracking-[0.2em] transition-colors">Список
                        Эфира</button>
                </div>

                <div id="calendar-mode">
                    <div class="glass p-4 rounded-sm mb-4">
                        <h2 class="text-[10px] mb-4 font-bold text-[#737373] border-l-2 border-[#99CCCC] pl-2">СОЗДАТЬ
                            СОБЫТИЕ</h2>
                        <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-3 items-end">
                            <div>
                                <label class="text-[8px] text-gray-500 block mb-1">ТИП</label>
                                <select id="sch-type" onchange="loadScheduleItems()" class="input-dark text-[10px]">
                                    <option value="track">ТРЕК</option>
                                    <option value="playlist">СЕТ</option>
                                </select>
                            </div>
                            <div class="lg:col-span-2">
                                <div class="flex items-center justify-between mb-1">
                                    <label class="text-[8px] text-gray-500 block">ЭЛЕМЕНТ</label>
                                    <button type="button"
                                        onclick="document.getElementById('sch-immediate-upload').click()"
                                        class="text-[8px] bg-[#99CCCC]/20 text-[#99CCCC] px-1.5 py-0.5 rounded-sm border border-[#99CCCC]/30 hover:bg-[#99CCCC]/40 transition">
                                        + ЗАГРУЗИТЬ АУДИО
                                    </button>
                                </div>
                                <select id="sch-item" class="input-dark text-[10px]"
                                    onchange="if(this.value==='UPLOAD_NEW') document.getElementById('sch-immediate-upload').click()"></select>
                                <input type="file" id="sch-immediate-upload" class="hidden"
                                    onchange="handleImmediateUpload()">
                            </div>
                            <div>
                                <label class="text-[8px] text-gray-500 block mb-1">НАЧАЛО</label>
                                <input type="datetime-local" id="sch-start" class="input-dark text-[10px]">
                            </div>
                            <div>
                                <label class="text-[8px] text-gray-500 block mb-1">КОНЕЦ</label>
                                <input type="datetime-local" id="sch-end" class="input-dark text-[10px]">
                            </div>
                            <div class="lg:col-span-2">
                                <label class="text-[8px] text-gray-500 block mb-1">АРТИСТ (ДЛЯ САЙТА)</label>
                                <select id="sch-artist" class="input-dark text-[10px] text-[#99CCCC]">
                                    <option value="">-- НЕ ПРИВЯЗЫВАТЬ --</option>
                                </select>
                            </div>
                            <div class="flex items-center gap-2 pb-2">
                                <input type="checkbox" id="sch-sync" checked class="accent-[#99CCCC]">
                                <label for="sch-sync"
                                    class="text-[8px] text-gray-500 cursor-pointer">СИНХРОНИЗИРОВАТЬ</label>
                            </div>
                            <div class="md:col-span-3 lg:col-span-6 flex justify-end mt-2">
                                <button onclick="scheduleEvent()" class="btn btn-primary text-[10px]">ДОБАВИТЬ В
                                    ЭФИР</button>
                            </div>
                        </div>
                    </div>

                    <!-- Calendar View -->
                    <div class="glass p-4 rounded-xl">
                        <div id="calendar"></div>
                    </div>
                </div>

                <div id="list-mode" class="hidden">
                    <div class="glass p-4 rounded-sm mb-4">
                        <div class="flex items-center justify-between">
                            <h2 class="text-[10px] font-bold text-[#737373] border-l-2 border-[#99CCCC] pl-2 uppercase">
                                ХРОНОЛОГИЯ ЭФИРА</h2>
                            <div class="flex items-center gap-4">
                                <span class="text-[9px] text-[#444] uppercase font-mono">ВЫБОР ДНЯ:</span>
                                <input type="date" id="list-date" onchange="loadListView()"
                                    class="input-dark w-40 text-[10px] border-[#333]">
                            </div>
                        </div>
                    </div>
                    <div class="glass p-6 rounded-sm min-h-[500px]">
                        <div id="schedule-list" class="space-y-4 max-h-[600px] overflow-y-auto pr-4 custom-scrollbar">
                            <div class="text-center py-20 text-[#444] font-mono text-[10px] uppercase tracking-widest">
                                Загрузка расписания...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2
                class="text-[10px] border-l-2 border-[#99CCCC] pl-2 mb-6 text-[#99CCCC] font-display uppercase tracking-widest">
                РЕДАКТИРОВАТЬ ЭФИР</h2>
            <input type="hidden" id="edit-id">
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] text-gray-500 block mb-1 uppercase font-mono">Название</label>
                    <input type="text" id="edit-title" class="input-dark text-[11px]">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] text-gray-500 block mb-1 uppercase font-mono">Начало (с сек)</label>
                        <input type="datetime-local" id="edit-start" step="1" class="input-dark text-[11px]">
                    </div>
                    <div>
                        <label class="text-[9px] text-gray-500 block mb-1 uppercase font-mono">Конец (с сек)</label>
                        <input type="datetime-local" id="edit-end" step="1" class="input-dark text-[11px]">
                    </div>
                </div>
                <div>
                    <label class="text-[9px] text-gray-500 block mb-1 uppercase font-mono">Синхронизация с
                        артистом</label>
                    <select id="edit-artist" class="input-dark text-[11px] text-[#99CCCC]">
                        <option value="">-- НЕ ПРИВЯЗЫВАТЬ --</option>
                    </select>
                </div>
                <div class="flex items-center gap-2 py-2">
                    <input type="checkbox" id="edit-sync" checked class="accent-[#99CCCC]">
                    <label for="edit-sync"
                        class="text-[9px] text-gray-400 uppercase font-mono cursor-pointer tracking-wider">СИНХРОНИЗИРОВАТЬ
                        ПРИ СОХРАНЕНИИ</label>
                </div>
                <div class="flex gap-3 pt-6">
                    <button onclick="saveScheduleEdit()"
                        class="btn btn-primary flex-1 py-3 text-[10px]">СОХРАНИТЬ</button>
                    <button onclick="closeEditModal()"
                        class="btn flex-1 py-3 text-[10px] border-[#2a2a2a] text-[#737373]">ОТМЕНА</button>
                </div>
                <button onclick="deleteFromModal()"
                    class="w-full text-[9px] text-red-900 hover:text-red-500 mt-4 uppercase font-mono tracking-widest transition-colors">УДАЛИТЬ
                    ИЗ ЭФИРА</button>
            </div>
        </div>
    </div>

    <div id="playlist-modal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-50 p-4">
        <div class="glass p-12 rounded-0 w-full max-w-4xl">
            <h2 id="modal-pl-name" class="text-xl mb-8 border-b border-[#1a1a1a] pb-4 font-display">ПЛЕЙЛИСТ: ...</h2>
            <div class="grid grid-cols-2 gap-12">
                <div>
                    <h3 class="text-[10px] text-gray-500 mb-4 font-mono">ДОСТУПНЫЕ ТРЕКИ</h3>
                    <div id="modal-all-tracks"
                        class="h-[400px] overflow-y-auto space-y-1 text-[10px] font-mono border border-[#1a1a1a] p-4 custom-scrollbar">
                    </div>
                </div>
                <div>
                    <h3 class="text-[10px] text-[#99CCCC] mb-4 font-mono">СОСТАВ ПЛЕЙЛИСТА</h3>
                    <div id="modal-pl-tracks"
                        class="h-[400px] overflow-y-auto space-y-1 text-[10px] font-mono border border-[#1a1a1a] p-4 bg-[#050505] custom-scrollbar">
                    </div>
                </div>
            </div>
            <div class="mt-8 flex justify-end">
                <button onclick="closeModal()" class="btn btn-primary px-12">ГОТОВО</button>
            </div>
        </div>
    </div>

    <script>
        // Check for token in URL (for auto-login via iframe)
        const urlParams = new URLSearchParams(window.location.search);
        const urlToken = urlParams.get('token');
        if (urlToken) {
            localStorage.setItem('token', urlToken);
            // Clean up URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        let token = localStorage.getItem('token');
        let calendar;
        let activePlaylistId = null;
        let dbArtists = [];

        // Communication with Next.js Parent
        window.addEventListener('message', (event) => {
            if (event.data.type === 'INIT_ARTISTS') {
                dbArtists = event.data.artists || [];
                populateArtistDropdown();
            }
        });

        function populateArtistDropdown() {
            const sel = document.getElementById('sch-artist');
            if (!sel) return;
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">-- НЕ ПРИВЯЗЫВАТЬ --</option>';
            dbArtists.forEach(a => {
                sel.innerHTML += `<option value="${a.id}">${a.name} (${a.show})</option>`;
            });
            sel.value = currentVal;
        }

        const _apiFetch = async (endpoint, options = {}) => {
            // Support token in query for audio streaming
            const currentToken = token || new URLSearchParams(window.location.search).get('token');
            options.headers = { ...options.headers, 'Authorization': `Bearer ${currentToken}` };
            const res = await fetch(`/api${endpoint}`, options);
            if (res.status === 401) { logout(); throw new Error('Auth failed'); }
            if (!res.ok) { const json = await res.json().catch(() => ({})); alert(json.error || 'API Error'); throw new Error(json.error); }
            return res.json();
        };

        const api = async (endpoint, options = {}, isFile = false) => {
            if (!isFile && options.body && typeof options.body !== 'string') {
                options.body = JSON.stringify(options.body);
                options.headers = { ...options.headers, 'Content-Type': 'application/json' };
            }
            return _apiFetch(endpoint, options);
        }

        function showView() {
            if (token) {
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('dashboard-view').classList.remove('hidden');
                initApp();
            } else {
                document.getElementById('login-view').classList.remove('hidden');
                document.getElementById('dashboard-view').classList.add('hidden');
            }
        }

        async function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                if (res.ok) {
                    const data = await res.json();
                    token = data.token;
                    localStorage.setItem('token', token);
                    showView();
                } else alert('Invalid credentials');
            } catch (e) { }
        }

        function logout() { token = null; localStorage.removeItem('token'); showView(); }

        let tracksData = [];
        let playlistsData = [];

        async function initApp() {
            if (!calendar) initCalendar();
            await loadTracks();
            await loadPlaylists();
            await loadScheduleItems();
            loadEvents();
        }

        /* TRACKS */
        async function loadTracks() {
            tracksData = await api('/tracks');
            const list = document.getElementById('track-list');
            list.innerHTML = tracksData.map(t => `
                <div class="flex justify-between items-center bg-[#0a0a0a] p-2 border border-[#1a1a1a] mb-1 group">
                    <button onclick="playTrack(${t.id}, '${t.originalname.replace(/'/g, "\\'")}')" class="text-[#99CCCC] hover:scale-110 transition-transform mr-2">▶</button>
                    <span class="truncate pr-2 flex-1 text-gray-400 group-hover:text-white transition-colors" title="${t.originalname}">${t.originalname.substring(0, 25)}</span>
                    <button onclick="deleteTrack(${t.id})" class="text-red-900 hover:text-red-500 font-bold ml-2 opacity-50 hover:opacity-100 transition-opacity">&times;</button>
                </div>
            `).join('');
        }

        function playTrack(id, title) {
            const container = document.getElementById('preview-container');
            const player = document.getElementById('audio-preview');
            const titleEl = document.getElementById('preview-title');

            container.classList.remove('hidden');
            titleEl.innerText = title;

            // Set source with token for auth
            player.src = `/api/tracks/${id}/stream?token=${token}`;
            player.play();
        }

        async function uploadTracks() {
            const files = document.getElementById('file-upload').files;
            if (!files.length) return;
            const btn = document.getElementById('upload-btn');
            const origTxt = btn.innerText;
            btn.innerText = 'Uploading...';
            btn.disabled = true;

            const formData = new FormData();
            for (let f of files) formData.append('files', f);
            try {
                await api('/tracks', { method: 'POST', body: formData }, true);
                document.getElementById('file-upload').value = '';
                await loadTracks();
                await loadScheduleItems();
            } catch (e) { } finally {
                btn.innerText = origTxt;
                btn.disabled = false;
            }
        }

        async function handleImmediateUpload() {
            const fileInp = document.getElementById('sch-immediate-upload');
            const files = fileInp.files;
            if (!files.length) return;

            const sel = document.getElementById('sch-item');
            const origTxt = sel.options[sel.selectedIndex].text;
            sel.options[sel.selectedIndex].text = 'Uploading...';
            sel.disabled = true;

            const formData = new FormData();
            formData.append('files', files[0]);
            try {
                const res = await api('/tracks', { method: 'POST', body: formData }, true);
                await loadTracks();
                await loadScheduleItems();

                // Find the new track and select it
                const newFilename = res.files[0];
                const newTrack = tracksData.find(t => t.filename === newFilename);
                if (newTrack) {
                    sel.value = newTrack.id;
                }
            } catch (e) {
                sel.value = "";
                alert("Upload failed");
            } finally {
                sel.disabled = false;
                fileInp.value = '';
            }
        }

        async function deleteTrack(id) {
            if (confirm('Delete track permanently?')) {
                await api(`/tracks/${id}`, { method: 'DELETE' });
                await loadTracks();
                await loadScheduleItems();
            }
        }

        /* PLAYLISTS */
        async function loadPlaylists() {
            playlistsData = await api('/playlists');
            const list = document.getElementById('playlist-list');
            list.innerHTML = playlistsData.map(p => `
                <div class="flex flex-col bg-[#121212] p-2 rounded border border-gray-800 cursor-pointer mb-2" onclick="openPlaylist(${p.id}, '${p.name.replace(/'/g, "\\'")}')">
                    <div class="flex justify-between items-center w-full">
                        <span class="truncate flex-1 font-bold text-[#99CCCC]">${p.name}</span>
                        <button onclick="event.stopPropagation(); deletePlaylist(${p.id})" class="text-red-500 hover:text-red-400 font-bold ml-2">&times;</button>
                    </div>
                    <div class="text-xs text-gray-500 mt-1">${p.track_count} tracks</div>
                </div>
            `).join('');
        }

        async function createPlaylist() {
            const name = document.getElementById('new-playlist-name').value;
            if (!name) return;
            await api('/playlists', { method: 'POST', body: { name, track_ids: [] } });
            document.getElementById('new-playlist-name').value = '';
            await loadPlaylists();
            await loadScheduleItems();
        }

        async function deletePlaylist(id) {
            if (confirm('Delete playlist?')) {
                await api(`/playlists/${id}`, { method: 'DELETE' });
                await loadPlaylists();
                await loadScheduleItems();
            }
        }

        /* PLAYLIST EDITOR MODAL */
        async function openPlaylist(id, name) {
            activePlaylistId = id;
            document.getElementById('modal-pl-name').innerText = `Editing: ${name}`;
            document.getElementById('playlist-modal').classList.remove('hidden');
            renderPlaylistEditor();
        }

        async function renderPlaylistEditor() {
            const plTracks = await api(`/playlists/${activePlaylistId}/tracks`);

            const allContainer = document.getElementById('modal-all-tracks');
            const plContainer = document.getElementById('modal-pl-tracks');

            allContainer.innerHTML = tracksData.map(t => `
                <div class="flex justify-between bg-gray-900 p-1 mb-1 rounded hover:bg-gray-800 cursor-pointer group">
                    <button onclick="event.stopPropagation(); playTrack(${t.id}, '${t.originalname.replace(/'/g, "\\'")}')" class="text-[#99CCCC] mr-2">▶</button>
                    <span class="truncate pr-2 flex-1" title="${t.originalname}" onclick="addToPlaylist(${t.id})">${t.originalname}</span>
                    <span class="text-green-500 font-bold" onclick="addToPlaylist(${t.id})">+</span>
                </div>
            `).join('');

            plContainer.innerHTML = plTracks.map(t => `
                <div class="flex justify-between items-center bg-gray-800 p-1 mb-1 rounded">
                    <span class="truncate pr-2" title="${t.originalname}">${t.originalname}</span>
                    <button onclick="removeFromPlaylist(${t.id})" class="text-red-500 font-bold text-lg leading-none">&times;</button>
                </div>
            `).join('');
            if (plTracks.length === 0) plContainer.innerHTML = '<div class="text-gray-500 text-center mt-4">No tracks</div>';
        }

        async function addToPlaylist(trackId) {
            await api(`/playlists/${activePlaylistId}/tracks`, { method: 'POST', body: { track_id: trackId } });
            renderPlaylistEditor();
            loadPlaylists();
        }

        async function removeFromPlaylist(trackId) {
            await api(`/playlists/${activePlaylistId}/tracks/${trackId}`, { method: 'DELETE' });
            renderPlaylistEditor();
            loadPlaylists();
        }

        function closeModal() { document.getElementById('playlist-modal').classList.add('hidden'); activePlaylistId = null; loadPlaylists(); }

        /* SCHEDULING & CALENDAR */
        function initCalendar() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'timeGridWeek',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,timeGridDay' },
                height: 600,
                slotMinTime: "00:00:00",
                slotMaxTime: "24:00:00",
                nowIndicator: true,
                events: async (info, successCallback, failureCallback) => {
                    const start = new Date(info.start).getTime();
                    const end = new Date(info.end).getTime();
                    try {
                        const schedule = await api(`/schedule?start=${start}&end=${end}`);
                        successCallback(schedule.map(s => ({
                            id: s.id,
                            title: s.title,
                            start: new Date(s.start_time).toISOString(),
                            end: new Date(s.end_time).toISOString(),
                            allDay: false
                        })));
                    } catch (e) { failureCallback(e); }
                },
                timeZone: 'local',
                eventClick: async (info) => {
                    if (confirm(`Delete scheduled event?\n${info.event.title}`)) {
                        await api(`/schedule/${info.event.id}`, { method: 'DELETE' });
                        calendar.refetchEvents();
                    }
                }
            });
            calendar.render();
        }

        async function loadScheduleItems() {
            const type = document.getElementById('sch-type').value;
            const sel = document.getElementById('sch-item');
            sel.innerHTML = '';
            if (type === 'playlist') {
                playlistsData.forEach(p => { sel.innerHTML += `<option value="${p.id}">${p.name}</option>`; });
            } else {
                sel.innerHTML = '<option value="UPLOAD_NEW">-- ЗАГРУЗИТЬ НОВЫЙ --</option>';
                tracksData.forEach(t => { sel.innerHTML += `<option value="${t.id}">${t.originalname}</option>`; });
            }
        }

        async function scheduleEvent() {
            const type = document.getElementById('sch-type').value;
            const itemIdStr = document.getElementById('sch-item').value;
            const sStr = document.getElementById('sch-start').value;
            const eStr = document.getElementById('sch-end').value;
            if (!itemIdStr || !sStr || !eStr) return alert("Fill all schedule fields");

            const item_id = parseInt(itemIdStr);
            const start_time = new Date(sStr).getTime();
            const end_time = new Date(eStr).getTime();
            if (end_time <= start_time) return alert("End time must be after start time");

            const titleObj = type === 'playlist' ? playlistsData.find(p => p.id === item_id) : tracksData.find(t => t.id === item_id);
            const title = `[${type.toUpperCase()}] ${titleObj ? (titleObj.name || titleObj.originalname) : 'Unknown'}`;

            try {
                const res = await api('/schedule', {
                    method: 'POST',
                    body: { title, type, item_id, start_time, end_time }
                });

                // Sync to parent if requested
                const syncCheckbox = document.getElementById('sch-sync');
                const artistId = document.getElementById('sch-artist').value;
                if (syncCheckbox.checked && artistId && window.parent) {
                    window.parent.postMessage({
                        type: 'SYNC_SCHEDULE',
                        event: {
                            id: res.id,
                            title: title,
                            type: type,
                            item_id: item_id,
                            start_time: start_time,
                            end_time: res.end_time || end_time,
                            artist_id: artistId
                        }
                    }, '*');
                }

                calendar.refetchEvents();
                document.getElementById('sch-start').value = '';
                document.getElementById('sch-end').value = '';
            } catch (e) { }
        }

        /* TABS & LIST VIEW */
        function switchMode(mode) {
            if (mode === 'calendar') {
                document.getElementById('calendar-mode').classList.remove('hidden');
                document.getElementById('list-mode').classList.add('hidden');
                document.getElementById('tab-calendar').classList.add('text-[#99CCCC]', 'border-b-2', 'border-[#99CCCC]');
                document.getElementById('tab-calendar').classList.remove('text-[#444]');
                document.getElementById('tab-list').classList.remove('text-[#99CCCC]', 'border-b-2', 'border-[#99CCCC]');
                document.getElementById('tab-list').classList.add('text-[#444]');
                if (calendar) calendar.render();
            } else {
                document.getElementById('calendar-mode').classList.add('hidden');
                document.getElementById('list-mode').classList.remove('hidden');
                document.getElementById('tab-list').classList.add('text-[#99CCCC]', 'border-b-2', 'border-[#99CCCC]');
                document.getElementById('tab-list').classList.remove('text-[#444]');
                document.getElementById('tab-calendar').classList.remove('text-[#99CCCC]', 'border-b-2', 'border-[#99CCCC]');
                document.getElementById('tab-calendar').classList.add('text-[#444]');

                // Set current date if empty
                const dateInp = document.getElementById('list-date');
                if (!dateInp.value) {
                    dateInp.value = new Date().toISOString().split('T')[0];
                }
                loadListView();
            }
        }

        async function loadListView() {
            const dateStr = document.getElementById('list-date').value;
            const start = new Date(dateStr + 'T00:00:00').getTime();
            const end = start + 24 * 60 * 60 * 1000;

            const listEl = document.getElementById('schedule-list');
            listEl.innerHTML = '<div class="text-center py-20 text-[#444] font-mono text-[10px] uppercase tracking-widest">Загрузка...</div>';

            try {
                const schedule = await api(`/schedule?start=${start}&end=${end}`);
                schedule.sort((a, b) => a.start_time - b.start_time);

                if (schedule.length === 0) {
                    listEl.innerHTML = '<div class="text-center py-20 text-[#444] font-mono text-[10px] uppercase tracking-widest">В этот день эфир не запланирован</div>';
                    return;
                }

                listEl.innerHTML = schedule.map(s => {
                    const st = new Date(s.start_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    const et = new Date(s.end_time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    const isNow = Date.now() >= s.start_time && Date.now() <= s.end_time;

                    return `
                        <div onclick="openEditModal(${s.id})" class="flex items-center gap-6 p-4 border border-[#1a1a1a] bg-[#050505] group hover:border-[#333] transition-colors cursor-pointer ${isNow ? 'border-l-4 border-l-[#99CCCC]' : ''}">
                            <div class="w-32 text-[10px] font-mono text-[#737373] flex-shrink-0">
                                ${st} — ${et}
                            </div>
                            <div class="flex-1">
                                <span class="text-[11px] font-bold text-white uppercase tracking-wider">${s.title}</span>
                                ${isNow ? '<span class="ml-3 text-[8px] bg-[#99CCCC] text-black px-1 py-0.5 font-bold animate-pulse">LIVE</span>' : ''}
                            </div>
                            <div class="text-[9px] text-gray-600 uppercase font-mono opacity-0 group-hover:opacity-100 transition-opacity">РЕДАКТИРОВАТЬ</div>
                        </div>
                    `;
                }).join('');
            } catch (e) {
                listEl.innerHTML = '<div class="text-center py-20 text-red-500 font-mono text-[10px] uppercase tracking-widest">Ошибка загрузки</div>';
            }
        }

        let editingEvent = null;

        async function openEditModal(id) {
            try {
                const events = await api(`/schedule`);
                editingEvent = events.find(e => e.id === id);
                if (!editingEvent) return;

                document.getElementById('edit-id').value = id;
                document.getElementById('edit-title').value = editingEvent.title;

                // Format for datetime-local (including seconds)
                const formatDT = (ts) => {
                    const d = new Date(ts);
                    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
                    return d.toISOString().slice(0, 19);
                };

                document.getElementById('edit-start').value = formatDT(editingEvent.start_time);
                document.getElementById('edit-end').value = formatDT(editingEvent.end_time);

                // Populate artists
                const sel = document.getElementById('edit-artist');
                sel.innerHTML = '<option value="">-- НЕ ПРИВЯЗЫВАТЬ --</option>';
                dbArtists.forEach(a => {
                    sel.innerHTML += `<option value="${a.id}">${a.name} (${a.show})</option>`;
                });
                // Find artist by title or leave empty for user to pick
                sel.value = "";

                document.getElementById('edit-modal').style.display = 'block';
            } catch (e) { }
        }

        function closeEditModal() {
            document.getElementById('edit-modal').style.display = 'none';
        }

        async function saveScheduleEdit() {
            const id = document.getElementById('edit-id').value;
            const title = document.getElementById('edit-title').value;
            const startStr = document.getElementById('edit-start').value;
            const endStr = document.getElementById('edit-end').value;

            if (!title || !startStr || !endStr) return alert("Заполни все поля");

            const start = new Date(startStr).getTime();
            const end = new Date(endStr).getTime();

            if (isNaN(start) || isNaN(end)) return alert("Некорректная дата");
            if (end <= start) return alert("Конец должен быть после начала");

            try {
                await api(`/schedule/${id}`, {
                    method: 'PUT',
                    body: {
                        title,
                        start_time: start,
                        end_time: end,
                        type: editingEvent.type,
                        item_id: editingEvent.item_id
                    }
                });

                // Sync to parent if requested
                const syncCheckbox = document.getElementById('edit-sync');
                const artistId = document.getElementById('edit-artist').value;
                if (syncCheckbox.checked && artistId && window.parent) {
                    window.parent.postMessage({
                        type: 'SYNC_SCHEDULE',
                        event: {
                            id: parseInt(id),
                            title: title,
                            type: editingEvent.type,
                            item_id: editingEvent.item_id,
                            start_time: start,
                            end_time: end,
                            artist_id: artistId
                        }
                    }, '*');
                }

                closeEditModal();
                loadListView();
                if (calendar) calendar.refetchEvents();
            } catch (e) { }
        }

        async function deleteFromModal() {
            const id = document.getElementById('edit-id').value;
            if (confirm('Удалить это событие?')) {
                await api(`/schedule/${id}`, { method: 'DELETE' });
                closeEditModal();
                loadListView();
                if (calendar) calendar.refetchEvents();
            }
        }

        async function deleteScheduleItem(id) {
            if (confirm('Удалить это событие из эфира?')) {
                await api(`/schedule/${id}`, { method: 'DELETE' });
                loadListView();
                if (calendar) calendar.refetchEvents();
            }
        }

        async function loadEvents() { if (calendar) calendar.refetchEvents(); }

        showView();
    </script>
</body>

</html>
